version: 2

models:
  - name: int_orders_with_customers
    description: "Orders joined with customer location data"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

  - name: int_order_items_enriched
    description: "Order items enriched with product category and seller details"
    columns:
      - name: order_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: seller_id
        tests:
          - not_null

  - name: int_reviews_summary
    description: "Aggregated review scores per order"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique